<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — Rafiki Help Me</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body class="auth-page">
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">❤</span>
          <span>Rafiki Help Me</span>
        </a>
        <nav class="nav-links" aria-label="Auth">
          <a href="/">Home</a>
          <a class="btn btn-primary" href="/signup.html">Create account</a>
        </nav>
      </div>
    </header>

    <main class="auth-main container">
      <section class="auth-panel" aria-labelledby="login-title">
        <h1 id="login-title">Log in</h1>
        <p class="auth-lead">Use the email and password you registered with.</p>

        <div
          class="auth-msg"
          data-auth-message
          role="alert"
          aria-live="polite"
          hidden
        ></div>

        <form id="login-form" class="auth-form" novalidate>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />

          <button class="btn btn-primary btn-block" type="submit">Log in</button>
        </form>

        <p class="auth-footer">
          No account?
          <a href="/signup.html">Sign up</a>
        </p>
      </section>
    </main>

    <script src="/js/auth.js" defer></script>
  </body>
</html>
